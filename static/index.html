<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 电报 · 实时新闻</title>
<style>
:root {
  --bg: #0a0e17;
  --bg-card: #131a2a;
  --bg-card-hover: #1a2340;
  --bg-surface: #0f1524;
  --border: #1e2a42;
  --text: #e0e6f0;
  --text-dim: #6b7a99;
  --text-muted: #4a5672;
  --accent: #00d4ff;
  --accent-dim: rgba(0,212,255,0.15);
  --green: #00e676;
  --red: #ff5252;
  --orange: #ffab40;
  --purple: #b388ff;
  --yellow: #ffd740;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  background: linear-gradient(180deg, #0f1524 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  max-width: 960px; margin: 0 auto;
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 18px; font-weight: 700; letter-spacing: -0.5px;
}
.logo-icon {
  width: 28px; height: 28px; border-radius: 6px;
  background: linear-gradient(135deg, var(--accent), #6366f1);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff;
}
.status-bar {
  display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-dim);
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.countdown { color: var(--accent); font-variant-numeric: tabular-nums; }

/* ── Mode Toggle ── */
.mode-toggle {
  display: flex; gap: 2px;
  background: var(--bg-surface);
  border-radius: 8px; padding: 2px;
  border: 1px solid var(--border);
}
.mode-btn {
  padding: 6px 14px; border-radius: 6px;
  border: none; background: transparent;
  color: var(--text-dim); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.mode-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
}

/* ── Category Tabs ── */
.tabs-wrap {
  max-width: 960px; margin: 0 auto;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-top: 10px;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs {
  display: flex; gap: 6px; min-width: max-content;
}
.tab {
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.tab.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}
.tab .count {
  display: inline-block; margin-left: 4px;
  font-size: 10px; opacity: 0.7;
}

/* ── Main Content ── */
.main {
  max-width: 960px; margin: 0 auto;
  padding: 12px 16px 80px;
}

/* ── News Card ── */
.news-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: all 0.2s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
}
.news-card:hover {
  background: var(--bg-card-hover);
  border-color: rgba(0,212,255,0.3);
}
.news-card:active { transform: scale(0.99); }
.news-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.source-badge {
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 4px;
  white-space: nowrap;
}
.source-财联社 { background: #1a365d; color: #63b3ed; }
.source-腾讯新闻 { background: #1a3329; color: #68d391; }
.source-新浪财经 { background: #3c1f1f; color: #fc8181; }
.source-华尔街见闻 { background: #2d1f3d; color: #b794f4; }
.source-36氪 { background: #1f2d3d; color: #90cdf4; }
.source-IT之家 { background: #3d2d1f; color: #fbd38d; }
.news-time {
  font-size: 11px; color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}
.news-title {
  font-size: 15px; font-weight: 600;
  line-height: 1.5; margin-bottom: 4px;
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}
.news-content {
  font-size: 13px; color: var(--text-dim);
  line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.news-tags {
  display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap;
}
.ai-tag {
  font-size: 10px; padding: 1px 6px;
  border-radius: 3px; font-weight: 500;
}
.tag-大模型 { background: rgba(99,179,237,0.15); color: #63b3ed; }
.tag-芯片算力 { background: rgba(255,171,64,0.15); color: #ffab40; }
.tag-AI应用 { background: rgba(0,230,118,0.15); color: #00e676; }
.tag-政策产业 { background: rgba(179,136,255,0.15); color: #b388ff; }
.tag-其他 { background: rgba(107,122,153,0.15); color: #6b7a99; }

/* ── Stock View ── */
.stock-view { display: none; }
.stock-view.active { display: block; }
.news-view { display: block; }
.news-view.hidden { display: none; }

.stock-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.stock-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: all 0.2s;
}
.stock-card:hover {
  border-color: rgba(0,212,255,0.3);
  background: var(--bg-card-hover);
}
.stock-name {
  font-size: 15px; font-weight: 600;
  margin-bottom: 2px;
}
.stock-code {
  font-size: 11px; color: var(--text-muted);
  margin-bottom: 10px;
}
.stock-price {
  font-size: 24px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  margin-bottom: 4px;
}
.stock-change {
  display: flex; gap: 10px;
  font-size: 13px; font-weight: 500;
  font-variant-numeric: tabular-nums;
}
.stock-up { color: var(--green); }
.stock-down { color: var(--red); }
.stock-flat { color: var(--text-dim); }
.stock-details {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4px; margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.stock-detail {
  display: flex; justify-content: space-between;
  font-size: 11px;
}
.stock-detail-label { color: var(--text-muted); }
.stock-detail-value { color: var(--text-dim); font-variant-numeric: tabular-nums; }

/* ── Stock Table (list mode) ── */
.stock-table {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.stock-row {
  display: grid;
  grid-template-columns: 1fr 80px 80px 70px;
  align-items: center;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.stock-row:last-child { border-bottom: none; }
.stock-row:hover { background: var(--bg-card-hover); }
.stock-row-header {
  font-size: 11px; color: var(--text-muted);
  font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px;
  background: var(--bg-surface);
}
.stock-row-header:hover { background: var(--bg-surface); }
.stock-cell { font-size: 13px; }
.stock-cell-right { text-align: right; font-variant-numeric: tabular-nums; }

/* ── View Toggle ── */
.view-toggle {
  display: flex; gap: 4px; margin-bottom: 12px;
}
.view-btn {
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-size: 12px;
  cursor: pointer; transition: all 0.2s;
}
.view-btn.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}

/* ── Stats Bar ── */
.stats-bar {
  display: flex; gap: 16px; margin-bottom: 12px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px; color: var(--text-dim);
  flex-wrap: wrap;
}
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-value { color: var(--accent); font-weight: 600; }

/* ── Source Filter ── */
.source-filters {
  display: flex; gap: 4px; margin-bottom: 12px;
  flex-wrap: wrap;
}
.source-filter {
  padding: 4px 10px; border-radius: 14px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-size: 11px;
  cursor: pointer; transition: all 0.2s;
}
.source-filter.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}

/* ── Loading ── */
.loading {
  text-align: center; padding: 40px;
  color: var(--text-muted);
}
.loading-spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Empty State ── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .header { padding: 10px 12px; }
  .main { padding: 10px 12px 80px; }
  .logo { font-size: 16px; }
  .stock-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .stock-card { padding: 10px; }
  .stock-price { font-size: 20px; }
  .stock-row { grid-template-columns: 1fr 70px 70px 60px; padding: 10px 12px; }
  .news-title { font-size: 14px; }
  .stats-bar { gap: 10px; padding: 8px 12px; }
}
@media (max-width: 380px) {
  .stock-grid { grid-template-columns: 1fr; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Animations ── */
.fade-in {
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.refresh-flash {
  animation: flash 0.5s ease-out;
}
@keyframes flash {
  0% { opacity: 0.5; }
  100% { opacity: 1; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">AI</div>
      <span>AI 电报</span>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="switchMode('news')">新闻</button>
      <button class="mode-btn" onclick="switchMode('stocks')">持仓</button>
    </div>
    <div class="status-bar">
      <div class="status-dot"></div>
      <span id="updateTime">--</span>
      <span class="countdown" id="countdown">30s</span>
    </div>
  </div>
  <div class="tabs-wrap" id="tabsWrap">
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<!-- Main Content -->
<div class="main">
  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-item">抓取 <span class="stat-value" id="statTotal">0</span> 条</div>
    <div class="stat-item">AI相关 <span class="stat-value" id="statAI">0</span> 条</div>
    <div class="stat-item">去重后 <span class="stat-value" id="statDedup">0</span> 条</div>
    <div class="stat-item">数据源 <span class="stat-value" id="statSources">6</span> 个</div>
  </div>

  <!-- News View -->
  <div class="news-view" id="newsView">
    <!-- Source Filters -->
    <div class="source-filters" id="sourceFilters"></div>
    <!-- News List -->
    <div id="newsList">
      <div class="loading"><div class="loading-spinner"></div>加载中...</div>
    </div>
  </div>

  <!-- Stock View -->
  <div class="stock-view" id="stockView">
    <div class="view-toggle">
      <button class="view-btn active" onclick="switchStockView('cards')">卡片</button>
      <button class="view-btn" onclick="switchStockView('table')">列表</button>
    </div>
    <div id="stockContent">
      <div class="loading"><div class="loading-spinner"></div>加载中...</div>
    </div>
  </div>
</div>

<script>
// ── State ──
let state = {
  mode: 'news',
  category: '全部',
  sourceFilter: '全部',
  stockView: 'cards',
  news: null,
  stocks: null,
  countdown: 30,
  timer: null,
};

const CATEGORIES = ['全部', '大模型', '芯片算力', 'AI应用', '政策产业'];
const SOURCES = ['全部', '财联社', '腾讯新闻', '新浪财经', '华尔街见闻', '36氪', 'IT之家'];

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  renderTabs();
  renderSourceFilters();
  fetchData();
  startCountdown();
});

// ── Mode Switch ──
function switchMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mode-btn[onclick="switchMode('${mode}')"]`).classList.add('active');

  const newsView = document.getElementById('newsView');
  const stockView = document.getElementById('stockView');
  const tabsWrap = document.getElementById('tabsWrap');
  const statsBar = document.getElementById('statsBar');

  if (mode === 'news') {
    newsView.classList.remove('hidden');
    stockView.classList.remove('active');
    tabsWrap.style.display = '';
    statsBar.style.display = '';
  } else {
    newsView.classList.add('hidden');
    stockView.classList.add('active');
    tabsWrap.style.display = 'none';
    statsBar.style.display = 'none';
    renderStocks();
  }
}

// ── Tabs ──
function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = CATEGORIES.map(cat => {
    const count = getCategoryCount(cat);
    return `<button class="tab ${state.category === cat ? 'active' : ''}"
            onclick="selectCategory('${cat}')">${cat}<span class="count">${count}</span></button>`;
  }).join('');
}

function getCategoryCount(cat) {
  if (!state.news) return '';
  if (cat === '全部') return state.news.all?.length || 0;
  return state.news.by_category?.[cat]?.length || 0;
}

function selectCategory(cat) {
  state.category = cat;
  renderTabs();
  renderNews();
}

// ── Source Filters ──
function renderSourceFilters() {
  const el = document.getElementById('sourceFilters');
  el.innerHTML = SOURCES.map(src =>
    `<button class="source-filter ${state.sourceFilter === src ? 'active' : ''}"
            onclick="selectSource('${src}')">${src}</button>`
  ).join('');
}

function selectSource(src) {
  state.sourceFilter = src;
  renderSourceFilters();
  renderNews();
}

// ── Fetch Data ──
async function fetchData() {
  try {
    const [newsRes, stockRes] = await Promise.all([
      fetch('/api/news'),
      fetch('/api/stocks'),
    ]);
    state.news = await newsRes.json();
    state.stocks = await stockRes.json();

    document.getElementById('updateTime').textContent =
      state.news.update_time?.split(' ')[1] || '--';
    document.getElementById('statTotal').textContent = state.news.total_fetched || 0;
    document.getElementById('statAI').textContent = state.news.ai_filtered || 0;
    document.getElementById('statDedup').textContent = state.news.after_dedup || 0;

    renderTabs();
    renderNews();
    renderStocks();
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

// ── Render News ──
function renderNews() {
  const el = document.getElementById('newsList');
  if (!state.news || !state.news.all) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📡</div>暂无数据</div>';
    return;
  }

  let items = state.news.all;

  // Filter by category
  if (state.category !== '全部') {
    items = items.filter(item =>
      item.categories?.includes(state.category)
    );
  }

  // Filter by source
  if (state.sourceFilter !== '全部') {
    items = items.filter(item => item.source === state.sourceFilter);
  }

  if (items.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>该分类暂无新闻</div>';
    return;
  }

  el.innerHTML = items.map((item, i) => {
    const tags = (item.categories || []).map(cat =>
      `<span class="ai-tag tag-${cat}">${cat}</span>`
    ).join('');

    const contentPreview = item.content !== item.title
      ? `<div class="news-content">${escHtml(item.content)}</div>` : '';

    return `<a class="news-card fade-in" href="${escHtml(item.url)}" target="_blank"
               rel="noopener" style="animation-delay:${Math.min(i * 30, 300)}ms">
      <div class="news-header">
        <span class="source-badge source-${item.source}">${item.source}</span>
        <span class="news-time">${item.time_str || ''}</span>
      </div>
      <div class="news-title">${escHtml(item.title)}</div>
      ${contentPreview}
      <div class="news-tags">${tags}</div>
    </a>`;
  }).join('');
}

// ── Render Stocks ──
function renderStocks() {
  if (!state.stocks || !state.stocks.stocks) return;
  const el = document.getElementById('stockContent');
  const stocks = state.stocks.stocks;

  if (stocks.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>暂无行情数据</div>';
    return;
  }

  if (state.stockView === 'cards') {
    el.innerHTML = `<div class="stock-grid">${stocks.map(renderStockCard).join('')}</div>`;
  } else {
    el.innerHTML = renderStockTable(stocks);
  }
}

function renderStockCard(s) {
  const cls = s.change_pct > 0 ? 'stock-up' : s.change_pct < 0 ? 'stock-down' : 'stock-flat';
  const sign = s.change > 0 ? '+' : '';
  return `<div class="stock-card">
    <div class="stock-name">${escHtml(s.name)}</div>
    <div class="stock-code">${s.code}.HK · ${escHtml(s.en_name)}</div>
    <div class="stock-price ${cls}">${s.current.toFixed(3)}</div>
    <div class="stock-change ${cls}">
      <span>${sign}${s.change.toFixed(3)}</span>
      <span>${sign}${s.change_pct.toFixed(2)}%</span>
    </div>
    <div class="stock-details">
      <div class="stock-detail"><span class="stock-detail-label">开盘</span><span class="stock-detail-value">${s.open.toFixed(3)}</span></div>
      <div class="stock-detail"><span class="stock-detail-label">最高</span><span class="stock-detail-value ${s.high >= s.prev_close ? 'stock-up' : 'stock-down'}">${s.high.toFixed(3)}</span></div>
      <div class="stock-detail"><span class="stock-detail-label">最低</span><span class="stock-detail-value ${s.low >= s.prev_close ? 'stock-up' : 'stock-down'}">${s.low.toFixed(3)}</span></div>
      <div class="stock-detail"><span class="stock-detail-label">昨收</span><span class="stock-detail-value">${s.prev_close.toFixed(3)}</span></div>
    </div>
  </div>`;
}

function renderStockTable(stocks) {
  let rows = `<div class="stock-table">
    <div class="stock-row stock-row-header">
      <div class="stock-cell">名称</div>
      <div class="stock-cell stock-cell-right">现价</div>
      <div class="stock-cell stock-cell-right">涨跌</div>
      <div class="stock-cell stock-cell-right">涨跌幅</div>
    </div>`;
  for (const s of stocks) {
    const cls = s.change_pct > 0 ? 'stock-up' : s.change_pct < 0 ? 'stock-down' : 'stock-flat';
    const sign = s.change > 0 ? '+' : '';
    rows += `<div class="stock-row">
      <div class="stock-cell">
        <div style="font-weight:600">${escHtml(s.name)}</div>
        <div style="font-size:11px;color:var(--text-muted)">${s.code}.HK</div>
      </div>
      <div class="stock-cell stock-cell-right ${cls}" style="font-weight:600">${s.current.toFixed(3)}</div>
      <div class="stock-cell stock-cell-right ${cls}">${sign}${s.change.toFixed(3)}</div>
      <div class="stock-cell stock-cell-right ${cls}">${sign}${s.change_pct.toFixed(2)}%</div>
    </div>`;
  }
  rows += '</div>';
  return rows;
}

function switchStockView(view) {
  state.stockView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.view-btn[onclick="switchStockView('${view}')"]`).classList.add('active');
  renderStocks();
}

// ── Countdown & Auto-refresh ──
function startCountdown() {
  state.countdown = 30;
  if (state.timer) clearInterval(state.timer);
  state.timer = setInterval(() => {
    state.countdown--;
    document.getElementById('countdown').textContent = `${state.countdown}s`;
    if (state.countdown <= 0) {
      state.countdown = 30;
      fetchData();
    }
  }, 1000);
}

// ── Utils ──
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
